global:
  resolve_timeout: 5m

route:
  receiver: ntfy
  group_by:
    - alertname
    - service
    - severity
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

receivers:
  - name: ntfy
    webhook_configs:
      - url_file: /run/secrets/ntfy_webhook_url
        send_resolved: true
        timeout: 10s
        max_alerts: 10
        http_config:
          authorization:
            type: Bearer
            credentials_file: /run/secrets/ntfy_token
